# Patchwork — Fly.io deployment config
# Deploy: fly launch --copy-config --no-deploy && fly deploy
# Budget target: $2-5/mo with auto-stop

app = "patchwork-changelog"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATABASE_URL = "/data/patchwork.db"
  STATIC_DIR = "packages/web/dist"
  CORS_ORIGINS = "*"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "patchwork_data"
  destination = "/data"
